<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh Sửa Tài Liệu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/library-ui.css" rel="stylesheet">
</head>
<body>
    <section class="lib-hero">
        <div class="container position-relative">
            <span class="eyebrow"><i class="fas fa-pen-to-square"></i>Chỉnh sửa tài liệu</span>
            <h1 class="display-5 fw-bold mb-3">Cập Nhật Tài Liệu</h1>
            <p class="lead mb-0 text-white-50">Sửa lại thông tin đầu sách trong kho thư viện.</p>
        </div>
    </section>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-10">
                <div class="lib-form-shell">
                    <div class="lib-form-head">
                        <h4 class="mb-1"><i class="fas fa-book-open me-2"></i>Thông tin tài liệu</h4>
                        <p class="mb-0 text-white-50">Cập nhật các thuộc tính của tài liệu hiện có.</p>
                    </div>
                    <div class="lib-form-body">
                        <form th:action="@{/taiLieu/{id}(id=${hangHoa.hanghoaID})}" method="post" th:object="${hangHoa}">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Mã tài liệu</label>
                                    <input type="text" class="form-control" th:field="*{hanghoaID}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tên tài liệu</label>
                                    <input type="text" class="form-control" th:field="*{tenHangHoa}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Loại tài liệu</label>
                                    <select class="form-select" th:field="*{loaiHangHoa}" required>
                                        <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                                        <option value="Nghiệp vụ">Nghiệp vụ</option>
                                        <option value="Thiết kế">Thiết kế</option>
                                        <option value="Kinh tế">Kinh tế</option>
                                        <option value="Tài liệu khác">Tài liệu khác</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Số lượng</label>
                                    <input type="number" class="form-control" th:field="*{soLuongHangHoa}" min="0" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Giá nhập</label>
                                    <input type="number" class="form-control" th:field="*{giaNhap}" step="0.01" min="0">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Nhà sản xuất / tác giả</label>
                                    <input type="text" class="form-control" th:field="*{nhaSanXuat}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Năm xuất bản</label>
                                    <input type="number" class="form-control" th:field="*{namSanXuat}" min="1900" max="2035">
                                </div>
                            </div>

                            <div class="lib-form-footer text-center">
                                <button type="submit" class="btn btn-warning btn-lg me-2">
                                    <i class="fas fa-save me-2"></i>Cập nhật
                                </button>
                                <a th:href="@{/taiLieu/{id}(id=${hangHoa.hanghoaID})}" class="btn btn-outline-primary btn-lg me-2">
                                    <i class="fas fa-eye me-2"></i>Xem chi tiết
                                </a>
                                <a href="/taiLieu" class="btn btn-outline-secondary btn-lg">
                                    <i class="fas fa-xmark me-2"></i>Hủy
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
