<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh Sửa Phiếu Mượn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/library-ui.css" rel="stylesheet">
</head>
<body>
    <section class="lib-hero">
        <div class="container position-relative">
            <span class="eyebrow"><i class="fas fa-pen-to-square"></i>Chỉnh sửa phiếu</span>
            <h1 class="display-5 fw-bold mb-3">Cập Nhật Phiếu Mượn - Trả</h1>
            <p class="lead mb-0 text-white-50">Điều chỉnh thông tin mượn, số lượng và giá trị phiếu đang lưu.</p>
        </div>
    </section>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-10">
                <div class="lib-form-shell">
                    <div class="lib-form-head danger">
                        <h4 class="mb-1"><i class="fas fa-pen-to-square me-2"></i>Chỉnh sửa phiếu mượn</h4>
                        <p class="mb-0 text-white-50">Cập nhật lại dữ liệu trước khi lưu.</p>
                    </div>
                    <div class="lib-form-body">
                        <form th:action="@{/muonTra/{id}(id=${ban.banId})}" method="post" th:object="${ban}">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Mã phiếu mượn</label>
                                    <input type="text" class="form-control" th:field="*{banCode}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Mã tài liệu</label>
                                    <input type="text" class="form-control" th:field="*{hangHoaID}" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">Tên tài liệu</label>
                                    <input type="text" class="form-control" th:field="*{tenHangHoa}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tên độc giả</label>
                                    <input type="text" class="form-control" th:field="*{tenKhachHang}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Mã độc giả</label>
                                    <input type="text" class="form-control" th:field="*{khachHang}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label"><i class="fas fa-calendar me-1"></i>Ngày mượn</label>
                                    <input type="datetime-local" class="form-control" th:field="*{ngayBan}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Ghi chú</label>
                                    <input type="text" class="form-control" th:field="*{ghiChu}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Số lượng</label>
                                    <input type="number" class="form-control" th:field="*{soLuongBan}" min="1" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Giá mượn</label>
                                    <input type="number" class="form-control" th:field="*{giaBan}" step="0.01" min="0" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Giá nhập tham chiếu</label>
                                    <input type="number" class="form-control" th:field="*{giaNhap}" step="0.01" min="0">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label">Tổng tiền</label>
                                    <input type="number" class="form-control" th:field="*{tongTien}" step="0.01" min="0">
                                </div>
                            </div>

                            <div class="lib-form-footer text-center">
                                <button type="submit" class="btn btn-danger btn-lg me-2">
                                    <i class="fas fa-save me-2"></i>Lưu thay đổi
                                </button>
                                <a th:href="@{/muonTra/{id}(id=${ban.banId})}" class="btn btn-outline-primary btn-lg me-2">
                                    <i class="fas fa-eye me-2"></i>Xem chi tiết
                                </a>
                                <a href="/muonTra" class="btn btn-outline-secondary btn-lg">
                                    <i class="fas fa-xmark me-2"></i>Hủy
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
