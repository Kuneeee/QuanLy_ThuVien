<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Phiếu Nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/library-ui.css" rel="stylesheet">
</head>
<body>
    <section class="lib-hero">
        <div class="container position-relative">
            <span class="eyebrow"><i class="fas fa-truck-ramp-box"></i>Tạo phiếu nhập</span>
            <h1 class="display-5 fw-bold mb-3">Thêm Phiếu Nhập Tài Liệu</h1>
            <p class="lead mb-0 text-white-50">Nhập nhanh thông tin đầu vào cho kho tài liệu.</p>
        </div>
    </section>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-10">
                <div class="lib-form-shell">
                    <div class="lib-form-head warning">
                        <h4 class="mb-1"><i class="fas fa-boxes-stacked me-2"></i>Phiếu nhập mới</h4>
                        <p class="mb-0 text-white-50">Tạo một phiếu nhập tài liệu vào hệ thống.</p>
                    </div>
                    <div class="lib-form-body">
                        <form th:action="@{/nhapTaiLieu}" method="post" th:object="${nhap}">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Mã phiếu nhập</label>
                                    <input type="text" class="form-control" th:field="*{maNhapHang}" placeholder="NH004" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Mã tài liệu</label>
                                    <input type="text" class="form-control" th:field="*{hanghoaID}" placeholder="TL004" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Tên tài liệu</label>
                                    <input type="text" class="form-control" th:field="*{tenHangHoa}" placeholder="Thiết kế giao diện web" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Số lượng nhập</label>
                                    <input type="number" class="form-control" th:field="*{soLuongNhap}" min="1" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Giá nhập</label>
                                    <input type="number" class="form-control" th:field="*{giaNhap}" step="0.01" min="0" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Nhà cung cấp</label>
                                    <input type="text" class="form-control" th:field="*{nhaCungCap}" placeholder="NXB / đơn vị cung cấp">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Người nhập</label>
                                    <input type="text" class="form-control" th:field="*{nguoiNhap}" placeholder="Quản trị thư viện">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Ghi chú</label>
                                    <textarea class="form-control" th:field="*{ghiChu}" rows="3" placeholder="Ghi chú thêm nếu cần"></textarea>
                                </div>
                            </div>

                            <div class="lib-form-footer text-center">
                                <button type="submit" class="btn btn-warning btn-lg me-2">
                                    <i class="fas fa-save me-2"></i>Lưu phiếu nhập
                                </button>
                                <a href="/nhapTaiLieu" class="btn btn-outline-secondary btn-lg">
                                    <i class="fas fa-xmark me-2"></i>Hủy
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
