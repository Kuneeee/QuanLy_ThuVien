<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh Sửa Phiếu Nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/library-ui.css" rel="stylesheet">
</head>
<body>
    <section class="lib-hero">
        <div class="container position-relative">
            <span class="eyebrow"><i class="fas fa-pen-to-square"></i>Chỉnh sửa phiếu</span>
            <h1 class="display-5 fw-bold mb-3">Cập Nhật Phiếu Nhập Tài Liệu</h1>
            <p class="lead mb-0 text-white-50">Sửa lại dữ liệu phiếu nhập trước khi lưu.</p>
        </div>
    </section>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-10">
                <div class="lib-form-shell">
                    <div class="lib-form-head warning">
                        <h4 class="mb-1"><i class="fas fa-box-archive me-2"></i>Phiếu nhập</h4>
                        <p class="mb-0 text-white-50">Điều chỉnh thông tin phiếu nhập đang lưu.</p>
                    </div>
                    <div class="lib-form-body">
                        <form th:action="@{/nhapTaiLieu/{id}(id=${nhap.nhapId})}" method="post" th:object="${nhap}">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Mã phiếu nhập</label>
                                    <input type="text" class="form-control" th:field="*{maNhapHang}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Mã tài liệu</label>
                                    <input type="text" class="form-control" th:field="*{hanghoaID}" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Tên tài liệu</label>
                                    <input type="text" class="form-control" th:field="*{tenHangHoa}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Số lượng nhập</label>
                                    <input type="number" class="form-control" th:field="*{soLuongNhap}" min="1" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Giá nhập</label>
                                    <input type="number" class="form-control" th:field="*{giaNhap}" step="0.01" min="0" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Nhà cung cấp</label>
                                    <input type="text" class="form-control" th:field="*{nhaCungCap}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Người nhập</label>
                                    <input type="text" class="form-control" th:field="*{nguoiNhap}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Trạng thái</label>
                                    <select class="form-select" th:field="*{trangThai}">
                                        <option value="Đã nhập">Đã nhập</option>
                                        <option value="Đang xử lý">Đang xử lý</option>
                                        <option value="Hoàn thành">Hoàn thành</option>
                                        <option value="Đã hủy">Đã hủy</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Ghi chú</label>
                                    <textarea class="form-control" th:field="*{ghiChu}" rows="3"></textarea>
                                </div>
                            </div>

                            <div class="lib-form-footer text-center">
                                <button type="submit" class="btn btn-warning btn-lg me-2">
                                    <i class="fas fa-save me-2"></i>Cập nhật
                                </button>
                                <a th:href="@{/nhapTaiLieu/{id}(id=${nhap.nhapId})}" class="btn btn-outline-primary btn-lg me-2">
                                    <i class="fas fa-eye me-2"></i>Xem chi tiết
                                </a>
                                <a href="/nhapTaiLieu" class="btn btn-outline-secondary btn-lg">
                                    <i class="fas fa-xmark me-2"></i>Hủy
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
