<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh Sửa Độc Giả</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/library-ui.css" rel="stylesheet">
</head>
<body>
    <section class="lib-hero">
        <div class="container position-relative">
            <span class="eyebrow"><i class="fas fa-pen-to-square"></i>Chỉnh sửa hồ sơ</span>
            <h1 class="display-5 fw-bold mb-3">Cập Nhật Độc Giả</h1>
            <p class="lead mb-0 text-white-50">Điều chỉnh thông tin người dùng và trạng thái tích lũy.</p>
        </div>
    </section>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-10">
                <div class="lib-form-shell">
                    <div class="lib-form-head warning">
                        <h4 class="mb-1"><i class="fas fa-user-pen me-2"></i>Hồ sơ độc giả</h4>
                        <p class="mb-0 text-white-50">Sửa nhanh thông tin độc giả đang được lưu.</p>
                    </div>
                    <div class="lib-form-body">
                        <form th:action="@{/docGia/{id}(id=${khachHang.khachHangId})}" method="post" th:object="${khachHang}">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Mã độc giả</label>
                                    <input type="text" class="form-control" th:field="*{khachHangId}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Tên độc giả</label>
                                    <input type="text" class="form-control" th:field="*{tenKhachHang}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Số điện thoại</label>
                                    <input type="text" class="form-control" th:field="*{soDienThoai}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" th:field="*{email}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Loại độc giả</label>
                                    <select class="form-select" th:field="*{loaiKhachHang}">
                                        <option value="Sinh viên">Sinh viên</option>
                                        <option value="Giáo viên">Giáo viên</option>
                                        <option value="Thường">Thường</option>
                                        <option value="VIP">VIP</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Điểm tích lũy</label>
                                    <input type="number" class="form-control" th:field="*{diemThuong}" min="0">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Địa chỉ</label>
                                    <textarea class="form-control" th:field="*{diaChi}" rows="3"></textarea>
                                </div>
                            </div>

                            <div class="lib-form-footer text-center">
                                <button type="submit" class="btn btn-warning btn-lg me-2">
                                    <i class="fas fa-save me-2"></i>Cập nhật
                                </button>
                                <a th:href="@{/docGia/{id}(id=${khachHang.khachHangId})}" class="btn btn-outline-primary btn-lg me-2">
                                    <i class="fas fa-eye me-2"></i>Xem chi tiết
                                </a>
                                <a href="/docGia" class="btn btn-outline-secondary btn-lg">
                                    <i class="fas fa-xmark me-2"></i>Hủy
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
